providers = ["php", "node"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"
]

[phases.build]
cmds = [
  "php artisan package:discover --ansi || true",
  "php artisan config:clear || true"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
